<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sufragio Digital - Login</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-image: url('fondo-login.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
        }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { width: 90%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #d32f2f; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background: #b71c1c; }
        #resultado { margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>ONPE - Validación Multifactor</h2>
        <p>Ingrese sus datos oficiales para sufragar</p>
        
        <input type="text" id="nombreInput" placeholder="Primer Nombre">
        <input type="text" id="apellidoInput" placeholder="Apellido Paterno o Materno">
        <input type="text" id="dniInput" placeholder="Número de DNI" maxlength="8">
        <input type="text" id="fechaEmisionInput" placeholder="Fecha de Emisión (DD/MM/YYYY)" maxlength="10">
        <input type="text" id="digitoInput" placeholder="Dígito Verificador (-X)" maxlength="1">
        
        <button onclick="validarIdentidad()">Validar Identidad</button>
        <div id="resultado"></div>
    </div>

    <script>
        async function validarIdentidad() {
            const nombre = document.getElementById('nombreInput').value.trim();
            const apellido = document.getElementById('apellidoInput').value.trim();
            const dni = document.getElementById('dniInput').value.trim();
            const fecha_emision = document.getElementById('fechaEmisionInput').value.trim();
            const digito_verificador = document.getElementById('digitoInput').value.trim();
            const resultadoDiv = document.getElementById('resultado');

            // VALIDACIÓN POSTAL LOCAL: Campos vacíos
            if (!nombre || !apellido || !dni || !fecha_emision || !digito_verificador) {
                resultadoDiv.innerHTML = "⚠️ Por favor, complete todos los campos de seguridad.";
                resultadoDiv.style.color = "#f57c00";
                return;
            }

            try {
                // Enviamos los 5 factores de autenticación a la ruta correcta del backend
                const respuesta = await fetch('http://localhost:3000/validar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, apellido, dni, fecha_emision, digito_verificador })
                });

                const datos = await respuesta.json();

                if (datos.exito) {
                    resultadoDiv.innerHTML = `✅ ${datos.mensaje}`;
                    resultadoDiv.style.color = "green";
                    
                    // Guardamos el DNI verificado para la cabina secreta
                    localStorage.setItem('dniElector', dni);
                    
                    // Redirección automática a la cabina tras 1.5 segundos
                    setTimeout(() => {
                        window.location.href = 'votar.html';
                    }, 1500);
                } else {
                    resultadoDiv.innerHTML = `❌ ${datos.mensaje}`;
                    resultadoDiv.style.color = "red";
                }
            } catch (error) {
                resultadoDiv.innerHTML = "❌ Error de conexión con el servidor de la ONPE.";
                resultadoDiv.style.color = "red";
            }
        }
    </script>
</body>
</html>
