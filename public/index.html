<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONPE - Portal del Elector</title>
    <style>
        /* =========================================================
           SISTEMA DE DISEÑO (UI) - BRANDING INSTITUCIONAL
           Se definen los colores oficiales (ONPE) y las variables globales.
           El objetivo es brindar confianza y formalidad al elector.
           ========================================================= */
        :root {
            --azul-onpe: #003B70;
            --rojo-peru: #D32F2F;
            --gris-claro: #F4F6F8;
            --blanco-translucido: rgba(255, 255, 255, 0.92);
        }
        
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('imagenes/fondo-login.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* TARJETA DE AUTENTICACIÓN (Efecto Glassmorphism)
           Se usa un fondo translúcido con desenfoque (backdrop-filter) para modernizar 
           la interfaz sin perder la legibilidad del formulario.
        */
        .login-card {
            background: var(--blanco-translucido);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 5px solid var(--rojo-peru);
        }

        .header-onpe h2 {
            color: var(--azul-onpe);
            margin-bottom: 5px;
            font-weight: 700;
        }

        .header-onpe p {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 25px;
        }

        /* Controles del Formulario */
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--azul-onpe);
            outline: none;
            box-shadow: 0 0 5px rgba(0, 59, 112, 0.2);
        }

        /* Botón de Acción Principal (Votar) */
        .btn-primary {
            background-color: var(--rojo-peru);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 15px;
        }

        .btn-primary:hover {
            background-color: #b71c1c;
        }

        /* Botón de Acción Secundaria (Resultados Públicos) */
        .btn-secondary {
            display: inline-block;
            background-color: transparent;
            color: var(--azul-onpe);
            border: 2px solid var(--azul-onpe);
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background-color: var(--azul-onpe);
            color: white;
        }

        #resultadoDiv {
            margin-top: 15px;
            font-weight: bold;
            font-size: 0.9em;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="header-onpe">
            <h2>Elecciones Generales</h2>
            <p>Portal de Autenticación del Elector</p>
        </div>

        <input type="text" id="nombreInput" placeholder="Primer Nombre">
        <input type="text" id="apellidoInput" placeholder="Apellido Paterno">
        <input type="text" id="dniInput" placeholder="Número de DNI (8 dígitos)" maxlength="8">
        <input type="date" id="fechaInput" title="Fecha de Emisión">
        <input type="text" id="digitoInput" placeholder="Dígito Verificador" maxlength="1">

        <button class="btn-primary" onclick="validarIdentidad()">Validar Identidad</button>
        
        <a href="/resultados" class="btn-secondary">📊 Ver Escrutinio en Vivo</a>

        <div id="resultadoDiv"></div>
    </div>

    <script>
        // =========================================================
        // LÓGICA FRONTEND: VALIDACIÓN DE IDENTIDAD Y CONTROL DE SESIÓN
        // =========================================================
        async function validarIdentidad() {
            
            // 1. RECOLECCIÓN Y FORMATEO DE DATOS
            // Obtenemos los valores ingresados. En el caso de la fecha, el input type="date"
            // devuelve YYYY-MM-DD, pero el padrón de la Base de Datos requiere el formato peruano
            // DD/MM/AAAA. Aquí interceptamos ese dato y lo volteamos matemáticamente.
            const nombre = document.getElementById('nombreInput').value.trim();
            const apellido = document.getElementById('apellidoInput').value.trim();
            const dni = document.getElementById('dniInput').value.trim();
            const fechaRaw = document.getElementById('fechaInput').value; 
            const partes = fechaRaw.split('-');
            const fecha_emision = partes.length === 3 ? `${partes[2]}/${partes[1]}/${partes[0]}` : ''; 
            const digito_verificador = document.getElementById('digitoInput').value.trim();
            const resultadoDiv = document.getElementById('resultadoDiv');

            // 2. VALIDACIÓN DE CAMPOS VACÍOS (Filtro Frontend)
            // Evitamos enviar consultas inútiles al servidor si faltan datos, 
            // ahorrando tráfico y recursos computacionales.
            if (!nombre || !apellido || !dni || !fecha_emision || !digito_verificador) {
                resultadoDiv.innerHTML = "⚠️ Por favor, complete todos los campos.";
                resultadoDiv.style.color = "#f57c00";
                return;
            }

            try {
                // 3. COMUNICACIÓN CON EL BACKEND (Controlador MVC)
                // Usamos fetch() para enviar los datos de forma asíncrona (sin recargar la página)
                // hacia la ruta /api/login, donde el servidor cruzará la info con la Base de Datos.
                const respuesta = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, apellido, dni, fecha_emision, digito_verificador })
                });

                const datos = await respuesta.json();

                // 4. MANEJO DE LA RESPUESTA Y CREACIÓN DE SESIÓN (State Management)
                if (datos.exito) {
                    resultadoDiv.innerHTML = `✅ ${datos.mensaje}`;
                    resultadoDiv.style.color = "green";
                    
                    // Si el elector es válido y aún no ha votado, guardamos su DNI en el 
                    // almacenamiento local (localStorage) del navegador. Esto actuará como un "pase" 
                    // o "token de sesión" para dejarlo entrar a la cabina de votación.
                    localStorage.setItem('dniElector', dni);
                    setTimeout(() => window.location.href = '/votar', 1500);
                } else {
                    // El servidor nos rechazó (ya votó, datos falsos, o fuera de horario)
                    resultadoDiv.innerHTML = `❌ ${datos.mensaje}`;
                    resultadoDiv.style.color = "red";
                }
            } catch (error) {
                resultadoDiv.innerHTML = "❌ Error de conexión con el servidor.";
                resultadoDiv.style.color = "red";
            }
        }
    </script>
</body>
</html>
