<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cédula de Sufragio - ONPE</title>
    <style>
        /* Estilo para las fotos de los candidatos */
        .foto-candidato {
            width: 80px; height: 80px; border-radius: 50%;
            object-fit: cover; margin: 0 auto 12px auto;
            border: 3px solid #e2e8f0; display: block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .tarjeta-partido.seleccionado .foto-candidato { border-color: #166534; }
        :root {
            --azul-onpe: #003B70;
            --rojo-peru: #D32F2F;
            --blanco-translucido: rgba(255, 255, 255, 0.95);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
            margin: 0; padding: 20px; min-height: 100vh;
            background-image: url('imagenes/fondo-votar.jpg');
            background-size: cover; background-attachment: fixed;
            display: flex; justify-content: center; align-items: flex-start;
        }

        .layout-electoral { display: flex; width: 100%; max-width: 1100px; gap: 20px; margin-top: 20px; }

        /* SIDEBAR */
        .sidebar-card {
            width: 280px; background: var(--blanco-translucido); backdrop-filter: blur(10px);
            padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-top: 5px solid var(--azul-onpe); flex-shrink: 0;
            display: flex; flex-direction: column;
        }

        .sidebar-card h3 { color: var(--azul-onpe); margin-top: 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }

        .btn-categoria {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; text-align: left; background: transparent; color: #333;
            border: 1px solid #cbd5e1; padding: 12px 15px; margin-bottom: 10px;
            border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-categoria:hover { background: #f1f5f9; }
        .btn-categoria.activa { background: var(--azul-onpe); color: white; border-color: var(--azul-onpe); }
        .check-listo { color: #166534; font-weight: bold; display: none; } /* Check verde cuando ya seleccionó */

        .btn-procesar {
            background-color: var(--rojo-peru); color: white; border: none; padding: 15px;
            border-radius: 6px; font-weight: bold; font-size: 16px; margin-top: auto;
            cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(211, 47, 47, 0.3);
        }
        .btn-procesar:hover { background-color: #b71c1c; }

        /* CABINA PRINCIPAL */
        .votar-card {
            flex-grow: 1; background: var(--blanco-translucido); backdrop-filter: blur(10px);
            padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; }
        .header h2 { margin: 0; color: var(--azul-onpe); font-size: 22px; }

        .grid-cedula { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        
        .tarjeta-partido { 
            background: white; border: 2px solid #cbd5e1; border-radius: 8px; padding: 20px; 
            text-align: center; cursor: pointer; transition: all 0.2s; 
        }
        .tarjeta-partido:hover { border-color: var(--azul-onpe); background-color: #f0f7ff; transform: translateY(-3px); }
        
        /* Efecto cuando se selecciona una tarjeta */
        .tarjeta-partido.seleccionado {
            border-color: #388e3c; background-color: #e8f5e9;
            box-shadow: 0 0 0 2px #388e3c;
        }

        .candidato-nombre { font-weight: bold; color: var(--azul-onpe); font-size: 16px; margin-bottom: 5px;}
        .partido-nombre { font-size: 13px; color: #666; }
        
        #mensaje-confirmacion { padding: 20px; border-radius: 8px; display: none; }
        .btn-accion { background: #166534; color: white; border: none; padding: 14px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; font-size: 16px; transition: 0.3s; }
        .btn-accion.inicio { background: var(--azul-onpe); }

        @media print {
            body { background: white !important; }
            .sidebar-card, .header, .grid-cedula, .btn-accion { display: none !important; }
            .votar-card, .layout-electoral { border: none !important; box-shadow: none !important; margin: 0; width: 100%; max-width: 100%; padding: 0;}
            #mensaje-confirmacion { display: block !important; border: 2px solid black !important; }
        }
    </style>
</head>
<body>

    <div class="layout-electoral">
        
        <aside class="sidebar-card" id="sidebar">
            <h3>Categorías de Sufragio</h3>
            <button class="btn-categoria activa" id="btn-presidencial" onclick="cargarCandidatos('presidencial', this)">
                1. Presidencial <span class="check-listo">✔️</span>
            </button>
            <button class="btn-categoria" id="btn-senado" onclick="cargarCandidatos('senado', this)">
                2. Senado <span class="check-listo">✔️</span>
            </button>
            <button class="btn-categoria" id="btn-diputados" onclick="cargarCandidatos('diputados', this)">
                3. Diputados <span class="check-listo">✔️</span>
            </button>
            <button class="btn-categoria" id="btn-andino" onclick="cargarCandidatos('andino', this)">
                4. Parl. Andino <span class="check-listo">✔️</span>
            </button>
            
            <button class="btn-procesar" style="margin-top: 40px;" onclick="validarYProcesar()">📥 PROCESAR SUFRAGIO</button>
        </aside>

        <main class="votar-card">
            <div class="header" id="cabecera-voto">
                <h2 id="titulo-categoria">Fórmula Presidencial</h2>
            </div>

            <div class="grid-cedula" id="cedula">
                <p style="text-align:center; width:100%;">Cargando cédula oficial...</p>
            </div>

            <div id="mensaje-confirmacion"></div>
        </main>

    </div>

    <script>
        const dniRecuperado = localStorage.getItem('dniElector');
        if (!dniRecuperado) window.location.href = '/';

        // 1. Memoria Local de las Decisiones del Usuario
        let estadoVotos = {
            presidencial: { id: null, nombre: null, idBlanco: null },
            senado: { id: null, nombre: null, idBlanco: null },
            diputados: { id: null, nombre: null, idBlanco: null },
            andino: { id: null, nombre: null, idBlanco: null }
        };

        let categoriaActual = 'presidencial';

        async function cargarCandidatos(categoria, botonElement) {
            categoriaActual = categoria;

            if (botonElement) {
                document.querySelectorAll('.btn-categoria').forEach(btn => btn.classList.remove('activa'));
                botonElement.classList.add('activa');
                document.getElementById('titulo-categoria').innerText = botonElement.innerText.replace(' ✔️', '');
            }

            const contenedor = document.getElementById('cedula');
            contenedor.innerHTML = '<p>Cargando datos seguros...</p>';

            try {
                const respuesta = await fetch(`/api/candidatos?categoria=${categoria}`);
                const candidatos = await respuesta.json();

                contenedor.innerHTML = '';
                candidatos.forEach(cand => {
                    if (cand.nombre === 'Voto en Blanco') {
                        estadoVotos[categoria].idBlanco = cand.id;
                    }

                    const esSeleccionado = estadoVotos[categoria].id === cand.id ? 'seleccionado' : '';

                    // Lógica para mostrar imagen SOLO en presidencial y evitar que el voto en blanco tenga foto
                    let imagenHTML = '';
                    if (categoria === 'presidencial' && cand.nombre !== 'Voto en Blanco') {
                        // Le agregamos la ruta imagenes/ al inicio
                        imagenHTML = `<img src="imagenes/${cand.foto_candidato}" class="foto-candidato" alt="${cand.nombre}" onerror="this.style.display='none'">`;
                    }

                    contenedor.innerHTML += `
                        <div class="tarjeta-partido ${esSeleccionado}" onclick="seleccionarOpcion(${cand.id}, '${cand.nombre}', this)">
                            ${imagenHTML}
                            <div class="candidato-nombre">${cand.nombre}</div>
                            <div class="partido-nombre">${cand.partido}</div>
                        </div>
                    `;
                });1
            } catch (error) {
                contenedor.innerHTML = '<p style="color:red;">Error de conexión con la ONPE.</p>';
            }
        }

        // 2. Lógica al hacer clic en una tarjeta (No envía el voto aún, solo lo guarda en memoria)
        function seleccionarOpcion(id, nombre, elementoHTML) {
            // Quitamos el color verde a todos y se lo ponemos al seleccionado
            document.querySelectorAll('.tarjeta-partido').forEach(t => t.classList.remove('seleccionado'));
            elementoHTML.classList.add('seleccionado');

            // Guardamos la decisión
            estadoVotos[categoriaActual].id = id;
            estadoVotos[categoriaActual].nombre = nombre;

            // Ponemos el check verde en el menú lateral
            document.querySelector(`#btn-${categoriaActual} .check-listo`).style.display = 'inline';
        }

        // 3. Botón Final "Procesar Sufragio"
        async function validarYProcesar() {
            // Autocompletar con blancos si faltan categorías
            let categoriasVacias = false;
            for (const cat in estadoVotos) {
                if (estadoVotos[cat].id === null) categoriasVacias = true;
            }

            if (categoriasVacias) {
                const autocompletar = confirm("⚠️ No ha seleccionado opciones en todas las categorías.\n\n¿Desea que el sistema registre 'Voto en Blanco' en las categorías faltantes y procese su sufragio?");
                if (!autocompletar) return; // Si dice Cancelar, se queda en la pantalla

                // Rellenamos los null con el ID del Voto en Blanco
                for (const cat in estadoVotos) {
                    if (estadoVotos[cat].id === null) {
                        estadoVotos[cat].id = estadoVotos[cat].idBlanco;
                        estadoVotos[cat].nombre = "Voto en Blanco";
                    }
                }
            } else {
                const confirmar = confirm("¿Está seguro de depositar su voto en las 4 ánforas digitales? Esta acción es irreversible.");
                if (!confirmar) return;
            }

            // Si llega aquí, es porque tiene las 4 opciones listas. Las enviamos al servidor.
            const payload = {
                dni: dniRecuperado,
                idsVotos: [
                    estadoVotos.presidencial.id,
                    estadoVotos.senado.id,
                    estadoVotos.diputados.id,
                    estadoVotos.andino.id
                ]
            };

            try {
                const respuesta = await fetch('/api/emitir-voto', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const datos = await respuesta.json();

                if(datos.exito) {
                    // Ocultamos la cabina
                    document.getElementById('cedula').style.display = 'none';
                    document.getElementById('cabecera-voto').style.display = 'none';
                    document.getElementById('sidebar').style.display = 'none';
                    
                    // Mostramos el recibo PDF detallado
                    const msj = document.getElementById('mensaje-confirmacion');
                    msj.style.display = 'block';
                    msj.innerHTML = `
                        <div style="background-color: #f0fdf4; border: 1px solid #bbf7d0; padding: 20px; border-radius: 8px;">
                            <h2 style="color:#003B70; margin-top:0; text-align: center;">CONSTANCIA OFICIAL DE SUFRAGIO</h2>
                            <p style="text-align: center; color: #166534; font-weight: bold;">✅ ${datos.mensaje}</p>
                            <hr style="border-top: 1px solid #ccc; margin: 15px 0;">
                            
                            <table style="width: 100%; text-align: left; line-height: 1.8;">
                                <tr><td><b>DNI Elector:</b></td> <td>${dniRecuperado}</td></tr>
                                <tr><td><b>Fecha y Hora:</b></td> <td>${new Date().toLocaleString('es-PE')}</td></tr>
                            </table>
                            
                            <h4 style="margin-bottom: 5px; color: #003B70;">Detalle de Emisión:</h4>
                            <ul style="line-height: 1.6;">
                                <li><b>Presidencial:</b> ${estadoVotos.presidencial.nombre}</li>
                                <li><b>Senado:</b> ${estadoVotos.senado.nombre}</li>
                                <li><b>Diputados:</b> ${estadoVotos.diputados.nombre}</li>
                                <li><b>Parl. Andino:</b> ${estadoVotos.andino.nombre}</li>
                            </ul>
                        </div>
                        
                        <button class="btn-accion" onclick="window.print()">🖨️ Descargar Constancia (PDF)</button>
                        <button class="btn-accion inicio" onclick="volverInicio()">📊 Finalizar e ir a Resultados</button>
                    `;
                    
                    // Borramos el DNI por seguridad
                    localStorage.removeItem('dniElector');
                } else {
                    alert(datos.mensaje); 
                }
            } catch (error) {
                alert("Error crítico conectando con el servidor.");
            }
        }

        function volverInicio() {
            window.location.href = '/resultados';
        }

        // Inicia cargando la presidencia
        cargarCandidatos('presidencial', document.getElementById('btn-presidencial'));
    </script>
</body>
</html>
